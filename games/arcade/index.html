<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vector Runner</title>
    <link rel="stylesheet" href="../../css/styles.css">
    <style>
        body { margin: 0; overflow: hidden; background: #0b0c10; }
        #game-canvas { display: block; }
        .ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .top-bar { display: flex; justify-content: space-between; padding: 1rem; color: #fff; pointer-events: auto;}
        .score-display { font-size: 1.5rem; color: var(--neon-blue); text-shadow: 0 0 10px var(--neon-blue); }
        .back-btn { color: white; text-decoration: none; font-weight: bold; background: rgba(255,255,255,0.1); padding: 0.5rem 1rem; border-radius: 20px; border: 1px solid var(--neon-blue);}
        #game-over-screen {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); flex-direction: column; justify-content: center; align-items: center; pointer-events: auto;
        }
        #game-over-screen h1 { color: var(--neon-pink); text-shadow: 0 0 20px var(--neon-pink); font-size: 3rem; margin-bottom: 1rem; }
        .btn { background: transparent; border: 2px solid var(--neon-blue); color: var(--neon-blue); padding: 1rem 2rem; font-size: 1.2rem; border-radius: 30px; cursor: pointer; box-shadow: 0 0 10px var(--neon-blue); transition: all 0.2s; margin: 0.5rem; text-transform: uppercase; font-weight: bold;}
        .btn:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <canvas id="game-canvas"></canvas>
    
    <div class="ui-layer">
        <div class="top-bar">
            <a href="../../index.html" class="back-btn">&lt; Hub</a>
            <div class="score-display">Score: <span id="score">0</span></div>
        </div>
    </div>

    <div id="game-over-screen">
        <h1>CRASHED</h1>
        <p style="color:white; font-size:1.2rem; margin-bottom:2rem;">Final Score: <span id="final-score">0</span></p>
        <button class="btn" id="restart-btn">Play Again</button>
    </div>

    <script src="../../shared/ads.js"></script>
    <script src="../../shared/vector_renderer.js"></script>
    <script src="game.js"></script>
</body>
</html>
